<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Smart Login System - Sign Up</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <link rel="stylesheet" href="css/signup.css" />
  </head>
  <body class="bg-background-light dark:bg-background-dark font-sans min-h-screen flex items-center justify-center p-4 transition-colors duration-200">
    <div class="w-full max-w-2xl bg-card-light dark:bg-card-dark rounded-lg shadow-card p-8 md:p-12 lg:p-16 border border-gray-200 dark:border-gray-700 relative overflow-hidden">
      
      <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-transparent via-primary to-transparent opacity-50"></div>
      
      <div class="text-center mb-10">
        <h1 class="text-3xl md:text-4xl font-semibold text-primary tracking-tight">
          Smart Login System
        </h1>
      </div>

      <form class="space-y-6">
        <div class="relative">
          <input id="name" class="w-full bg-transparent border border-gray-300 dark:border-input-border-dark text-gray-900 dark:text-gray-100 placeholder-gray-500 dark:placeholder-gray-400 rounded px-4 py-3 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all duration-200" placeholder="Enter your name" type="text" />
        </div>
        <div class="relative">
          <input id="email" class="w-full bg-transparent border border-gray-300 dark:border-input-border-dark text-gray-900 dark:text-gray-100 placeholder-gray-500 dark:placeholder-gray-400 rounded px-4 py-3 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all duration-200" placeholder="Enter your email" type="email" />
        </div>
        <div class="relative">
          <input id="password" class="w-full bg-transparent border border-gray-300 dark:border-input-border-dark text-gray-900 dark:text-gray-100 placeholder-gray-500 dark:placeholder-gray-400 rounded px-4 py-3 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all duration-200" placeholder="Enter password" type="password" />
        </div>

        <p id="error" class="text-center text-sm font-semibold"></p>

        <button id="Sign-Up" onclick="add()" class="SignUp w-full border border-primary text-primary hover:bg-primary hover:text-white dark:hover:text-white font-medium py-3 px-4 rounded transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary dark:focus:ring-offset-gray-900" type="button">
          Sign Up
        </button>
      </form>

      <div class="mt-8 text-center">
        <p class="text-gray-600 dark:text-gray-400 text-sm">
          You have an account?
          <a class="text-gray-900 dark:text-white hover:text-primary dark:hover:text-primary hover:underline transition-colors ml-1" href="../login/login.html">Signin</a>
        </p>
      </div>
    </div>
    
    <div class="absolute top-4 right-4">
      <button class="p-2 rounded-full bg-gray-200 dark:bg-gray-700 text-gray-800 dark:text-gray-200 hover:bg-gray-300 dark:hover:bg-gray-600 transition-colors" onclick="document.documentElement.classList.toggle('dark')">
        <span class="material-icons text-sm">brightness_4</span>
      </button>
    </div>

    <script>
      document.documentElement.classList.add("dark");
    </script>
    
    <script src="signup.js"></script>
  </body>
</html>
