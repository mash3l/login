<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Welcome Dashboard - Smart Login System</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&amp;display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/home.css" />
  </head>
  <body
    class="bg-background-light dark:bg-background-dark font-display min-h-screen flex flex-col transition-colors duration-300"
  >
    <nav
      class="bg-card-light dark:bg-[rgba(36,53,63,0.8)] border-b border-gray-200 dark:border-gray-700 py-4 px-6 md:px-12 flex justify-between items-center shadow-sm relative z-10 backdrop-blur-sm"
    >
      <a
        class="text-gray-800 dark:text-gray-200 font-medium tracking-wide text-lg hover:text-primary transition-colors"
        href="#"
        >SMART LOGIN</a
      >
      <button
        class="px-4 py-2 bg-transparent border border-secondary text-secondary rounded hover:bg-secondary hover:text-gray-900 transition-colors duration-300 text-sm font-medium"
      >
        Logout
      </button>
    </nav>
    <main class="flex-grow flex items-center justify-center p-6">
      <div
        class="w-full max-w-3xl bg-card-light dark:bg-[#1f2e38] rounded-lg shadow-lg dark:shadow-custom-dark p-12 md:p-20 text-center transform transition-all duration-300 hover:scale-[1.01]"
      >
        <h1 class="text-3xl md:text-5xl font-light text-primary tracking-wide">
          Welcome mohamed
        </h1>
      </div>
    </main>
    <footer class="text-center py-4 text-gray-500 dark:text-gray-400 text-xs">
      © 2023 Smart Login System. All rights reserved.
    </footer>
    <script>
      // Simple logic to ensure dark mode is applied by default as per the dark-themed screenshots
      if (
        window.matchMedia &&
        window.matchMedia("(prefers-color-scheme: dark)").matches
      ) {
        document.documentElement.classList.add("dark");
      } else {
        // Forcing dark mode here because the prompt screenshots are heavily dark themed
        // Remove this else block if you want it to respect light mode user preference strictly
        document.documentElement.classList.add("dark");
      }
    </script>
  </body>
</html>
